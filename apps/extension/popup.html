<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SlopGuard</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body class="sg-popup">
    <!-- Aurora Background -->
    <div class="aurora-bg">
      <div class="aurora-blob blob-1"></div>
      <div class="aurora-blob blob-2"></div>
    </div>

    <main>
      <h1>SlopGuard</h1>
      <p class="sg-subtitle">Human oversight scoring is active.</p>
      
      <div class="glass-panel">
        <h2>Today's Stats</h2>
        <div id="todayStats">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="glass-panel">
        <h2>Settings</h2>
        <label>
          API URL
          <input id="apiUrl" value="http://localhost:8000" />
        </label>
        <button id="save">Save Configuration</button>
        <p id="status"></p>
      </div>

      <div class="glass-panel">
        <h2>Recent History</h2>
        <div id="history">
          <!-- Populated by JS -->
        </div>
      </div>
    </main>
    <script src="src/popup.js"></script>
  </body>
</html>
