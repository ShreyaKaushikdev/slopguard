name: SlopGuard CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Test FastAPI Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/api
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run pytest
      run: |
        python -m pytest tests/ -v

  build-frontend:
    name: Build & Lint Next.js Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/web
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check types & Lint
      run: |
        npm run lint
        
    - name: Build project
      run: npm run build
